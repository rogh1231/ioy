<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ノリ打ち精算アプリ</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --sub: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --muted: #f3f4f6;
      --danger: #dc2626;
      --positive: #166534;
      --negative: #991b1b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      min-height: 100vh;
      padding: 20px 14px 28px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 20px;
    }

    h1 {
      font-size: 24px;
      margin: 0 0 18px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 14px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      font-size: 16px;
      background: #fff;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .primary {
      margin-top: 8px;
      background: var(--primary);
      color: white;
    }

    .primary:hover { background: var(--primary-dark); }

    .secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
      margin-top: 16px;
    }

    .panel {
      margin-top: 16px;
      background: var(--muted);
      border-radius: 16px;
      padding: 14px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .meta {
      display: grid;
      gap: 6px;
      font-size: 14px;
      color: var(--sub);
    }

    .person-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      margin-top: 12px;
    }

    .person-name {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
    }

    .detail-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .detail-label {
      font-size: 14px;
      color: var(--sub);
    }

    .detail-value {
      font-size: 15px;
      font-weight: 700;
      text-align: right;
      word-break: break-all;
    }

    .positive { color: var(--positive); }
    .negative { color: var(--negative); }

    .error {
      margin-top: 12px;
      color: var(--danger);
      font-size: 14px;
      font-weight: 600;
    }

    .note {
      margin-top: 10px;
      font-size: 12px;
      color: var(--sub);
      line-height: 1.6;
    }

    .hidden { display: none; }

    @media (max-width: 380px) {
      .card { padding: 16px; }
      h1 { font-size: 21px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="inputScreen">
        <h1>ノリ打ち精算アプリ</h1>

        <div class="field">
          <label for="a">I君投資額</label>
          <input id="a" type="number" inputmode="numeric" min="0" step="1" placeholder="例: 4000" />
        </div>

        <div class="field">
          <label for="b">O君投資額</label>
          <input id="b" type="number" inputmode="numeric" min="0" step="1" placeholder="例: 5000" />
        </div>

        <div class="field">
          <label for="c">Y君投資額</label>
          <input id="c" type="number" inputmode="numeric" min="0" step="1" placeholder="例: 6000" />
        </div>

        <div class="field">
          <label for="d">換金総額</label>
          <input id="d" type="number" inputmode="numeric" min="0" step="1" placeholder="例: 21000" />
        </div>

        <button id="calcBtn" class="primary">計算実行</button>
        <div id="error" class="error hidden"></div>

        <div class="panel">
          <div class="panel-title">計算ルール</div>
          <div class="meta">
            <div>全員の損益が同じになるよう計算します</div>
            <div>入力された人だけを対象に計算します(投資額が未入力の人は除外されます)</div>
          </div>
        </div>

        <div class="note">
          <div>※ 途中でお金の貸し借りが発生し、借りたお金を投入した場合は、借りた人ではなく貸した人の投資額に加算してください</div>
        </div>
      </div>

      <div id="resultScreen" class="hidden">
        <h1>計算結果</h1>
        
        <div class="panel">
          <div class="panel-title">全体統計</div>
          <div class="meta" id="summary"></div>
        </div>

        <div class="panel">
          <div class="panel-title">清算の内訳</div>
          <div id="distributionPanel"></div>
        </div>

        <button id="backBtn" class="secondary">戻る</button>
      </div>
    </div>
  </div>

  <script>
    const aInput = document.getElementById('a');
    const bInput = document.getElementById('b');
    const cInput = document.getElementById('c');
    const dInput = document.getElementById('d');
    const calcBtn = document.getElementById('calcBtn');
    const backBtn = document.getElementById('backBtn');
    const errorBox = document.getElementById('error');
    const inputScreen = document.getElementById('inputScreen');
    const resultScreen = document.getElementById('resultScreen');
    const distributionPanel = document.getElementById('distributionPanel');
    const summary = document.getElementById('summary');

    function formatYen(value) {
      return new Intl.NumberFormat('ja-JP', {
        style: 'currency',
        currency: 'JPY',
        maximumFractionDigits: 0,
      }).format(Math.abs(Math.round(value)));
    }

    function formatSignedYen(value) {
      return `${value >= 0 ? '+' : '-'}${formatYen(value)}`;
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.remove('hidden');
    }

    function clearError() {
      errorBox.textContent = '';
      errorBox.classList.add('hidden');
    }

    function readOptionalNonNegativeInt(input) {
      const raw = input.value.trim();
      if (raw === '') return null;
      const n = Number(raw);
      if (!Number.isFinite(n) || n < 0) return NaN;
      return Math.round(n);
    }

    function calculateTransfers(targetAmounts) {
      const payers = targetAmounts
        .filter(x => x.amount < 0)
        .map(x => ({ name: x.name, remain: -x.amount }));

      const receivers = targetAmounts
        .filter(x => x.amount > 0)
        .map(x => ({ name: x.name, remain: x.amount }));

      const transfers = [];
      let i = 0;
      let j = 0;

      while (i < payers.length && j < receivers.length) {
        const amount = Math.min(payers[i].remain, receivers[j].remain);
        if (amount > 0) {
          transfers.push({
            from: payers[i].name,
            to: receivers[j].name,
            amount
          });
          payers[i].remain -= amount;
          receivers[j].remain -= amount;
        }
        if (payers[i].remain === 0) i += 1;
        if (receivers[j].remain === 0) j += 1;
      }

      return transfers;
    }

    calcBtn.addEventListener('click', () => {
      clearError();

      const a = readOptionalNonNegativeInt(aInput);
      const b = readOptionalNonNegativeInt(bInput);
      const c = readOptionalNonNegativeInt(cInput);
      const d = readOptionalNonNegativeInt(dInput);

      if (d === null) {
        showError('換金総額を入力してください。');
        return;
      }

      if ([a, b, c, d].some(v => Number.isNaN(v))) {
        showError('0以上の数値を入力してください。');
        return;
      }

      const members = [
        { name: 'I君', investment: a },
        { name: 'O君', investment: b },
        { name: 'Y君', investment: c },
      ].filter(x => x.investment !== null);

      if (members.length < 2) {
        showError('投資額を入力した人が2人以上必要です。');
        return;
      }

      const people = members.length;
      const totalInvestment = members.reduce((acc, cur) => acc + cur.investment, 0);
      const averageInvestment = totalInvestment / people;
      const averageProfit = (d - totalInvestment) / people;
      const totalProfit = d - totalInvestment;

      // 各人の最終的な配分額（合計は換金総額 d）
      const rawTargets = members.map(m => ({
        ...m,
        targetRaw: d / people + m.investment - averageInvestment
      }));

      const roundedTargets = rawTargets.map(x => Math.floor(x.targetRaw));
      let diff = d - roundedTargets.reduce((acc, cur) => acc + cur, 0);

      const fractions = rawTargets
        .map((x, idx) => ({ idx, frac: x.targetRaw - Math.floor(x.targetRaw) }))
        .sort((p, q) => q.frac - p.frac);

      for (let i = 0; i < diff; i++) {
        roundedTargets[fractions[i % fractions.length].idx] += 1;
      }

      const targetAmounts = members.map((m, idx) => ({
        ...m,
        amount: roundedTargets[idx]
      }));

      // マイナス→プラスへの支払い一覧
      const transfers = calculateTransfers(targetAmounts);

      const displayData = targetAmounts.map(person => {
        const incoming = transfers.filter(t => t.to === person.name);
        const outgoing = transfers.filter(t => t.from === person.name);
        const incomingTotal = incoming.reduce((sum, t) => sum + t.amount, 0);
        const outgoingTotal = outgoing.reduce((sum, t) => sum + t.amount, 0);

        // プラスの人だけ、換金からの受取を表示
        // 「換金からの受取 + 他人からの受取 = 受け取り合計」を一致させる
        const exchangeReceive = person.amount > 0 ? person.amount - incomingTotal : 0;

        return {
          ...person,
          incoming,
          outgoing,
          incomingTotal,
          outgoingTotal,
          exchangeReceive
        };
      });

      distributionPanel.innerHTML = displayData.map(person => {
        const incomingRows = person.incoming.map(t => `
          <div class="detail-row">
            <div class="detail-label">${t.from}からの受取</div>
            <div class="detail-value positive">${formatYen(t.amount)}</div>
          </div>
        `).join('');

        const outgoingRows = person.outgoing.map(t => `
          <div class="detail-row">
            <div class="detail-label">${t.to}への支払い</div>
            <div class="detail-value negative">${formatYen(t.amount)}</div>
          </div>
        `).join('');

        const actionRow = person.amount >= 0
          ? `<div class="detail-row">
               <div class="detail-label">受け取り合計</div>
               <div class="detail-value positive">${formatYen(person.amount)}</div>
             </div>`
          : `<div class="detail-row">
               <div class="detail-label">支払い合計</div>
               <div class="detail-value negative">${formatYen(-person.amount)}</div>
             </div>`;

        return `
          <div class="person-card">
            <div class="person-name">${person.name}</div>
            <div class="detail-row">
              <div class="detail-label">投資額</div>
              <div class="detail-value">${formatYen(person.investment)}</div>
            </div>
            ${person.exchangeReceive > 0 ? `
            <div class="detail-row">
              <div class="detail-label">換金からの受取</div>
              <div class="detail-value positive">${formatYen(person.exchangeReceive)}</div>
            </div>` : ''}
            ${incomingRows}
            ${outgoingRows}
            ${actionRow}
          </div>
        `;
      }).join('');

      summary.innerHTML = `
        <div>計算対象人数: ${people}人</div>
        <div>投資額合計: ${formatYen(totalInvestment)}</div>
        <div>平均投資額: ${formatYen(averageInvestment)}</div>
        <div>換金総額: ${formatYen(d)}</div>
        <div>全体損益: ${totalProfit >= 0 ? '+' : '-'}${formatYen(totalProfit)}</div>
        <div>1人あたり損益: ${averageProfit >= 0 ? '+' : '-'}${formatYen(averageProfit)}</div>
      `;

      inputScreen.classList.add('hidden');
      resultScreen.classList.remove('hidden');
    });

    backBtn.addEventListener('click', () => {
      resultScreen.classList.add('hidden');
      inputScreen.classList.remove('hidden');
    });
  </script>
</body>
</html>
